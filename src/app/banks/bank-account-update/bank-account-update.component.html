<div class="container">
    <div class="pageHeader">
        <h2>Update Bank Account</h2>
    </div>
    <!-- Display server side errors -->
    <span *ngIf="this.errorService.errorMessage" class="text-danger">{{this.errorService.errorMessage}}</span> 
    <!-- Form for update a bank account -->  
    <form [formGroup]="form" (ngSubmit)="save()">
        <div class="form-group mb-2 mt-5 col-md-6">
            <input type="text" formControlName="accountName" class="form-control" placeholder="Account name">
            <span class="text-danger" 
            *ngIf="form.get('accountName')?.touched && form.get('accountName')?.hasError('required')">
            Account name is required</span>
            <span class="text-danger" 
            *ngIf="form.get('accountName')?.touched && form.get('accountName')?.hasError('maxLength')">
            Max length is 50 characters</span>        
        </div>
        <div class="form-group mb-2">
            <input type="text" formControlName="accountNumber" class="form-control" placeholder="Account number">
            <span class="text-danger" 
            *ngIf="form.get('accountNumber')?.touched && form.get('accountNumber')?.hasError('required')">
            Account number is required</span>
            <span class="text-danger" 
            *ngIf="form.get('accountNumber')?.touched && form.get('accountNumber')?.hasError('maxLength')">
            Max length is 50 characters</span>        
        </div>
        <div class="form-group mb-2">
            <select formControlName="bankId" class="form-control">
                <option value="">Select Bank</option>
                <option *ngFor="let bank of banks" [value]="bank.key">{{ bank.value}}</option>
            </select>
            <span class="text-danger" 
            *ngIf="form.get('bankId')?.touched && form.get('bankId')?.hasError('required')">
            Bank is required</span>
        </div>     
        <div class="mt-3">
            <button type="submit" class="btn btn-primary">Save</button>
        </div>
    </form>
</div>
