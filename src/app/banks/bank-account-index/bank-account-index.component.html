<div class="container">
    <div class="pageHeader">
        <h2>Banks Accounts</h2>
    </div>
    <!-- Form for search  --> 
    <form [formGroup]="form" (ngSubmit)="search()">
        <div class="row">
            <div class="form-group mb-2 mt-2 col-md-6">
                <input type="text" formControlName="search" class="form-control" placeholder="search">
            </div>
            <div class="mb-2 mt-2 col-md-6">
                <button type="submit" class="btn btn-primary">Search</button>
            </div>
        </div>
    </form>    
    <!-- Table for bank accounts  -->
    <table mat-table [dataSource]="bankAccounts" class="mat-elevation-z8 table-index">
        <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef>Id</th>
            <td mat-cell *matCellDef="let element">{{element.id}}</td>
        </ng-container>
        <ng-container matColumnDef="accountName">
            <th mat-header-cell *matHeaderCellDef>Account Name</th>
            <td mat-cell *matCellDef="let element">{{element.accountName}}</td>
        </ng-container>
        <ng-container matColumnDef="accountNumber">
            <th mat-header-cell *matHeaderCellDef>Account Number</th>
            <td mat-cell *matCellDef="let element">{{element.accountNumber}}</td>
        </ng-container>
        <ng-container matColumnDef="bank">
            <th mat-header-cell *matHeaderCellDef>Bank</th>
            <td mat-cell *matCellDef="let element">{{element.bank}}</td>
        </ng-container>                
        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let element">
                <a
                    routerLink="/bankaccounts/update/{{element.id}}"
                    mat-flat-button color="primary"
                >
                Edit
                </a>
                <button (click)="delete(element.id)" class="btn btn-danger m-2">Delete</button>
            </td>
        </ng-container>
    
        <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
        <tr mat-row *matRowDef="let row; columns: columnsToDisplay"></tr>
    </table>
    
    <mat-paginator [pageSizeOptions]="[3, 10, 20, 50]" showFirstLastButtons
    [length]="totalRecords" [pageSize]="pageSize" (page)="updatePagination($event)"
    class="mat-elevation-z8"> 
    </mat-paginator>
</div>
