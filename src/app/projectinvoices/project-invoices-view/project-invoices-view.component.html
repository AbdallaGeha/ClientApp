<div class="container">
    <div class="pageHeader">
        <h2>Project Invoices View</h2>
    </div>
    <!-- Form for search criteria -->
    <form [formGroup]="form" (ngSubmit)="search()">
        <div class="row">
            <div class="form-group mb-2 mt-2 col-md-6">
                <input type="number" formControlName="id" class="form-control" placeholder="Id">
            </div>
            <div class="form-group mb-2 mt-2 col-md-6">
                <input type="text" formControlName="reference" class="form-control" placeholder="Reference Number">
            </div>
       
            <div class="form-group mb-2 col-md-6">
                <select formControlName="projectId" class="form-control">
                    <option value ="">Select Project</option>
                    <option *ngFor="let project of projects" [value]="project.key">{{ project.value}}</option>
                </select>
            </div>
            <div class="form-group mb-2 col-md-6">
                <select formControlName="supplierId" class="form-control">
                    <option value="">Select Supplier</option>
                    <option *ngFor="let supplier of suppliers" [value]="supplier.key">{{ supplier.value}}</option>
                </select>
            </div>
            <div class="form-group mb-2 col-md-6">
                <select formControlName="state" class="form-control">
                    <option value ="">Select State</option>
                    <option [value] ="1">Created</option>
                    <option [value] ="2">Approved</option>
                </select>
            </div>    
            <div class="form-group mb-2 col-md-6">
                <input type="date" formControlName="fromDate" class="form-control">
            </div>
            <div class="form-group mb-2 col-md-6">
                <input type="date" formControlName="toDate" class="form-control">
            </div>        
            <div>
                <button type="submit" class="btn btn-primary mb-2">Search</button>
            </div>
    </div>
    </form>
    <!-- Table for project invoices detailed info --> 
    <table mat-table [dataSource]="invoices" class="mat-elevation-z8 table-index">
        <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef>Id</th>
            <td mat-cell *matCellDef="let element">{{element.id}}</td>
        </ng-container>
        <ng-container matColumnDef="referenceNumber">
            <th mat-header-cell *matHeaderCellDef>Reference</th>
            <td mat-cell *matCellDef="let element">{{element.referenceNumber}}</td>
        </ng-container>
        <ng-container matColumnDef="date">
            <th mat-header-cell *matHeaderCellDef>Date</th>
            <td mat-cell *matCellDef="let element">{{element.date}}</td>
        </ng-container>
        <ng-container matColumnDef="project">
            <th mat-header-cell *matHeaderCellDef>Project</th>
            <td mat-cell *matCellDef="let element">{{element.project}}</td>
        </ng-container>
        <ng-container matColumnDef="supplier">
            <th mat-header-cell *matHeaderCellDef>Supplier</th>
            <td mat-cell *matCellDef="let element">{{element.supplier}}</td>
        </ng-container>
        <ng-container matColumnDef="state">
            <th mat-header-cell *matHeaderCellDef>State</th>
            <td mat-cell *matCellDef="let element">{{element.state}}</td>
        </ng-container> 
        <ng-container matColumnDef="amount">
            <th mat-header-cell *matHeaderCellDef>Amount</th>
            <td mat-cell *matCellDef="let element">{{element.amount}}</td>
        </ng-container>                           
        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let element">
                <a
                    routerLink="/projectinvoices/update/{{element.id}}"
                    mat-flat-button color="primary"
                >
                Edit
                </a>
            </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
        <tr mat-row *matRowDef="let row; columns: columnsToDisplay"></tr>
    </table>
    <mat-paginator [pageSizeOptions]="[3, 10, 20, 50]" showFirstLastButtons
    [length]="totalRecords" [pageSize]="pageSize" (page)="updatePagination($event)"
    class="mat-elevation-z8"> 
    </mat-paginator>    
</div>
