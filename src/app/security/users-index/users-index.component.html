<div class="container">
    <div class="pageHeader">
        <h2>Users</h2>
    </div>
    <!-- Table for users  -->
    <table mat-table [dataSource]="users" class="mat-elevation-z8 table-index">
        <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef>Id</th>
            <td mat-cell *matCellDef="let element">{{element.id}}</td>
        </ng-container>
        <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef>Email</th>
            <td mat-cell *matCellDef="let element">{{element.email}}</td>
        </ng-container>
        <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Name</th>
            <td mat-cell *matCellDef="let element">{{element.name}}</td>
        </ng-container>
        <ng-container matColumnDef="phonenumber">
            <th mat-header-cell *matHeaderCellDef>Phone</th>
            <td mat-cell *matCellDef="let element">{{element.phoneNumber}}</td>
        </ng-container>            
        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let element">
                <a
                    routerLink="/users/userroles/{{element.email}}"
                    mat-flat-button color="primary"
                >
                Roles
                </a>
            </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
        <tr mat-row *matRowDef="let row; columns: columnsToDisplay"></tr>
    </table>
    <mat-paginator [pageSizeOptions]="[3, 10, 20, 50]" showFirstLastButtons
    [length]="totalRecords" [pageSize]="pageSize" (page)="updatePagination($event)"
    class="mat-elevation-z8"> 
    </mat-paginator>
</div>
