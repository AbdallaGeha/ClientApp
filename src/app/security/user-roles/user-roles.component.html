<div class="container">
    <div class="pageHeader">
        <h2>User Roles</h2>
    </div>
    <!-- Display server side errors -->
    <span *ngIf="this.errorService.errorMessage" class="text-danger">{{this.errorService.errorMessage}}</span>

    <div *ngIf="userRoles && userRoles.user" class="container">
        <!-- Display user info -->
        <div class="form-group mt-3">
            <label class="form-label">Name</label>
            <input class="form-control" disabled value="{{userRoles.user.name}}">
        </div>
        <div class="form-group mt-3">
            <label class="form-label">Email</label>
            <input class="form-control" disabled value="{{userRoles.user.email}}">
        </div>
        <div class="form-group mt-3">
            <label class="form-label">Phone</label>
            <input class="form-control" disabled value="{{userRoles.user.phoneNumber}}">
        </div>
        <!-- Display user roles -->
        <div  *ngIf="userRoles.roles.length > 0" class="mt-3">
            <table class="table table-bordered border-primary">
                <tr>
                    <th>Role</th>
                    <th></th>
                </tr>
                <tr *ngFor="let role of userRoles.roles">
                    <td>{{role}}</td>
                    <td>
                        <button class="btn btn-danger" (click)="removeRole(role)">Remove</button>
                    </td>
                </tr>
            </table>        
        </div>
        <!-- Form for role selection -->
        <form [formGroup]="form" (ngSubmit)="assignRole()">
            <div class="form-group mt-3">
                <label class="form-label">Roles</label>
                <select formControlName="role" class="form-control">
                    <option value="">Select Role</option> 
                    <option *ngFor="let role of roles" [value]="role">{{ role }}</option>
                </select>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-primary" [disabled]="form.invalid">Assign Role</button>
            </div>
        </form> 
    </div>
</div>
